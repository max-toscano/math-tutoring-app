<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#FFFFFF"/>
  <!-- Title -->
  <text x="200" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1A1A2E">Parts of an Angle</text>
  <!-- Coordinate axes (light gray) -->
  <line x1="60" y1="230" x2="370" y2="230" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="100" y1="270" x2="100" y2="50" stroke="#CCCCCC" stroke-width="1"/>
  <!-- Initial Side (horizontal ray) -->
  <line x1="100" y1="230" x2="340" y2="230" stroke="#6C63FF" stroke-width="3"/>
  <polygon points="340,230 328,224 328,236" fill="#6C63FF"/>
  <!-- Terminal Side (ray at ~45°) -->
  <line x1="100" y1="230" x2="280" y2="80" stroke="#6C63FF" stroke-width="3"/>
  <polygon points="280,80 268,88 276,96" fill="#6C63FF"/>
  <!-- Arc between rays -->
  <path d="M 160,230 A 60,60 0 0,0 142,188" fill="none" stroke="#6C63FF" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Theta label -->
  <text x="172" y="205" font-family="sans-serif" font-size="18" font-style="italic" fill="#6C63FF">θ</text>
  <!-- Vertex dot -->
  <circle cx="100" cy="230" r="5" fill="#6C63FF"/>
  <!-- Labels -->
  <text x="90" y="260" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1A1A2E">Vertex</text>
  <text x="260" y="255" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1A1A2E">Initial Side</text>
  <text x="230" y="72" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1A1A2E">Terminal Side</text>
</svg>