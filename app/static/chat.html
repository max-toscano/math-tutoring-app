<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Tutor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 16px 20px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a3e;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header h1 {
            font-size: 18px;
            color: #6C63FF;
        }
        .header .status {
            font-size: 12px;
            color: #4ECDC4;
            margin-left: auto;
        }
        .mode-bar {
            display: flex;
            gap: 8px;
            padding: 10px 20px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a3e;
            overflow-x: auto;
        }
        .mode-btn {
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid #3a3a4e;
            background: transparent;
            color: #999;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .mode-btn.active {
            background: #6C63FF;
            border-color: #6C63FF;
            color: white;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
        }
        .msg.user {
            align-self: flex-end;
            background: #6C63FF;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg.assistant {
            align-self: flex-start;
            background: #1e1e30;
            border: 1px solid #2a2a3e;
            border-bottom-left-radius: 4px;
        }
        .msg .meta {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
        }
        .msg.assistant .meta { color: #555; }
        .input-area {
            padding: 16px 20px;
            background: #1a1a2e;
            border-top: 1px solid #2a2a3e;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            background: #0f0f1a;
            border: 1px solid #3a3a4e;
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #6C63FF;
        }
        .input-area button {
            padding: 12px 20px;
            background: #6C63FF;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }
        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .typing {
            align-self: flex-start;
            color: #666;
            font-size: 13px;
            padding: 8px 16px;
        }
        .tools-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #2a2a3e;
            border-radius: 8px;
            font-size: 11px;
            color: #4ECDC4;
            margin-right: 4px;
        }
        .katex { font-size: 1.05em; }
        .katex-display { margin: 12px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧮 Math Tutor</h1>
        <span class="status" id="status">Ready</span>
    </div>
    <div class="mode-bar">
        <button class="mode-btn active" data-mode="auto">Auto</button>
        <button class="mode-btn" data-mode="explain">Explain</button>
        <button class="mode-btn" data-mode="guide_me">Guide Me</button>
        <button class="mode-btn" data-mode="hint">Hint</button>
        <button class="mode-btn" data-mode="check_answer">Check Answer</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <input type="text" id="input" placeholder="Ask a math question..." autofocus>
        <button id="send" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const API = window.location.origin || 'http://localhost:8002';
        let sessionId = null;
        let selectedMode = 'auto';
        let conversationHistory = [];

        // Mode buttons
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedMode = btn.dataset.mode;
            });
        });

        // Enter key
        document.getElementById('input').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Start session on load
        async function startSession() {
            try {
                const res = await fetch(`${API}/chat/start-session`, { method: 'POST' });
                const data = await res.json();
                sessionId = data.session_id;
                document.getElementById('status').textContent = `Session: ${sessionId.slice(0, 8)}...`;
            } catch (e) {
                document.getElementById('status').textContent = 'Connection failed';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message || !sessionId) return;

            input.value = '';
            document.getElementById('send').disabled = true;

            // Add user message
            addMessage('user', message);

            // Show typing indicator
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.textContent = 'Thinking...';
            document.getElementById('messages').appendChild(typing);
            scrollToBottom();

            try {
                const res = await fetch(`${API}/chat/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        message: message,
                        selected_mode: selectedMode,
                        conversation_history: conversationHistory,
                    }),
                });

                const data = await res.json();
                typing.remove();

                // Build meta info
                let meta = [];
                if (data.topic) meta.push(`topic: ${data.topic}`);
                if (data.mode) meta.push(`mode: ${data.mode}`);
                if (data.tools_used && data.tools_used.length > 0) {
                    meta.push(`tools: ${data.tools_used.join(', ')}`);
                }

                addMessage('assistant', data.response, meta.join(' · '), data.tools_used);

                // Update conversation history
                conversationHistory.push({ role: 'user', content: message });
                conversationHistory.push({ role: 'assistant', content: data.response });

            } catch (e) {
                typing.remove();
                addMessage('assistant', 'Something went wrong. Please try again.');
            }

            document.getElementById('send').disabled = false;
            document.getElementById('input').focus();
        }

        function addMessage(role, content, meta = '', tools = []) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerHTML = content;

            if (meta) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'meta';
                if (tools && tools.length > 0) {
                    metaDiv.innerHTML = tools.map(t =>
                        `<span class="tools-badge">${t}</span>`
                    ).join('') + ' ' + meta;
                } else {
                    metaDiv.textContent = meta;
                }
                div.appendChild(metaDiv);
            }

            document.getElementById('messages').appendChild(div);
            scrollToBottom();

            // Render KaTeX
            if (role === 'assistant') {
                renderMathInElement(div, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\[', right: '\\]', display: true },
                        { left: '\\(', right: '\\)', display: false },
                    ],
                    throwOnError: false,
                });
            }
        }

        function scrollToBottom() {
            const msgs = document.getElementById('messages');
            msgs.scrollTop = msgs.scrollHeight;
        }

        // Serve static files needs this route
        startSession();
    </script>
</body>
</html>
